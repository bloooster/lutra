<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лютра - Магазин</title>
    <link rel="stylesheet" href="2styles.css">
</head>
<body>
    <div class="site-wrapper">
        <!-- ШАПКА -->
        <header class="header">
            <div class="container header__container">
                <div class="header__logo">
                    <img src="images/lutyra-logo.png" alt="Лютра" class="header__logo-img">
                    <span class="header__logo-text">Лютра</span>
                </div>
                
                <nav class="header__nav">
                    <a href="index.html" class="header__nav-link">Главная</a>
                    <a href="catalog.html" class="header__nav-link">Каталог</a>
                    <a href="#" class="header__nav-link">Доставка</a>
                    <a href="#" class="header__nav-link">Поддержка</a>
                </nav>
                
                <div class="header__actions">
                    <a href="cart.html" class="header__cart" aria-label="Корзина">
                        <img src="images/cart.png" alt="">
                    </a>
                    <button class="header__profile" aria-label="Личный кабинет">
                        <img src="images/profile.png" alt="">
                    </button>
                </div>
            </div>
        </header>

        <!-- КНОПКИ КАТАЛОГ И ФИЛЬТРЫ -->
        <section class="buttons-section">
            <div class="container">
                <div class="buttons-row">
                    <img src="images/каталог.jpg" alt="Каталог" class="btn-catalog-img">
                    <button class="btn-filters-new">ФИЛЬТРЫ</button>
                </div>
            </div>
        </section>

        <!-- ГАЛЕРЕЯ ИЗОБРАЖЕНИЙ -->
        <section class="gallery-section">
            <div class="container">
                <!-- Первый ряд - большая картинка -->
                <div class="row">
                    <div class="image-large">
                        <img src="images\screen saver.jpg" alt="Большое изображение">
                    </div>
                </div>

                <!-- Второй ряд - три картинки -->
                <div class="row">
                    <div class="image-medium image-tall">
                        <img src="images/product4.jpg" alt="Изображение товара 1">
                    </div>
                    <div class="image-medium image-medium-height">
                        <a href="product.html">
                            <img src="images/product5.jpg" alt="Изображение товара 2">
                        </a>
                    </div>
                    <div class="image-medium image-tall">
                        <img src="images/product3.jpg" alt="Изображение товара 3">
                    </div>
                </div>

                <!-- Третий ряд - три картинки -->
                <div class="row">
                    <div class="image-medium image-medium-height">
                        <img src="images/product6.jpg" alt="Изображение товара 4">
                    </div>
                    <div class="image-medium image-tall">
                        <img src="images/product7.jpg" alt="Изображение товара 5">
                    </div>
                    <div class="image-medium image-medium-height">
                        <img src="images/product8.jpg" alt="Изображение товара 6">
                    </div>
                </div>
            </div>
        </section>

        <!-- МОДАЛЬНОЕ ОКНО С ФИЛЬТРАМИ -->
<div id="filtersModal" class="modal-filters">
    <div class="modal-filters-content">
        <div class="modal-filters-header">
            <h2 class="modal-filters-title">ФИЛЬТРЫ</h2>
            <span class="modal-filters-close">&times;</span>
        </div>
        
        <div class="modal-filters-body">
            <!-- Фильтр по категориям -->
            <div class="filter-group">
                <h3 class="filter-group-title">Категории</h3>
                <label class="filter-checkbox">
                    <input type="checkbox" value="textile"> Текстиль
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" value="ceramics"> Керамика
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" value="jewelry"> Ювелирные украшения
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" value="glass"> Стеклянные изделия
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" value="graphics"> Графическая продукция
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" value="wood"> Деревянные изделия
                </label>
            </div>
            
            <!-- Фильтр по цене -->
            <div class="filter-group">
                <h3 class="filter-group-title">Цена</h3>
                <label class="filter-radio">
                    <input type="radio" name="price" value="cheap"> Сначала дешёвые
                </label>
                <label class="filter-radio">
                    <input type="radio" name="price" value="expensive"> Сначала дорогие
                </label>
                <label class="filter-radio">
                    <input type="radio" name="price" value="discount"> Скидки и акции
                </label>
            </div>
            
            <!-- Фильтр по наличию -->
            <div class="filter-group">
                <h3 class="filter-group-title">Наличие</h3>
                <label class="filter-radio">
                    <input type="radio" name="availability" value="in_stock"> Есть в наличии
                </label>
                <label class="filter-radio">
                    <input type="radio" name="availability" value="out_of_stock"> Нет в наличии
                </label>
            </div>
            
            <!-- Фильтр "Изделия с браком" -->
            <div class="filter-group">
                <h3 class="filter-group-title">Особые условия</h3>
                <label class="filter-checkbox">
                    <input type="checkbox" value="defective"> Изделия с браком (уценённые товары)
                </label>
            </div>
        </div>
        
        <div class="modal-filters-footer">
            <button class="filter-btn-reset">Сбросить все</button>
            <button class="filter-btn-apply">Применить</button>
        </div>
    </div>
</div>

<script>
    // Модальное окно для фильтров
    const filtersModal = document.getElementById('filtersModal');
    const btnFilters = document.querySelector('.btn-filters-new');
    const closeFiltersBtn = document.querySelector('.modal-filters-close');
    const resetFiltersBtn = document.querySelector('.filter-btn-reset');
    const applyFiltersBtn = document.querySelector('.filter-btn-apply');
    
    // Открытие окна фильтров
    if (btnFilters) {
        btnFilters.addEventListener('click', function() {
            filtersModal.style.display = 'flex';
        });
    }
    
    // Закрытие окна
    if (closeFiltersBtn) {
        closeFiltersBtn.addEventListener('click', function() {
            filtersModal.style.display = 'none';
        });
    }
    
    // Закрытие при клике вне окна
    window.addEventListener('click', function(event) {
        if (event.target === filtersModal) {
            filtersModal.style.display = 'none';
        }
    });
    
    // Сброс всех фильтров
    if (resetFiltersBtn) {
        resetFiltersBtn.addEventListener('click', function() {
            const checkboxes = document.querySelectorAll('#filtersModal input[type="checkbox"]');
            const radios = document.querySelectorAll('#filtersModal input[type="radio"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
            });
            radios.forEach(radio => {
                radio.checked = false;
            });
        });
    }
    
    // Применение фильтров
    if (applyFiltersBtn) {
        applyFiltersBtn.addEventListener('click', function() {
            // Собираем выбранные фильтры
            const selectedCategories = [];
            const selectedCheckboxes = document.querySelectorAll('#filtersModal input[type="checkbox"]:checked');
            const selectedPrice = document.querySelector('#filtersModal input[name="price"]:checked');
            const selectedAvailability = document.querySelector('#filtersModal input[name="availability"]:checked');
            
            selectedCheckboxes.forEach(checkbox => {
                if (checkbox.value !== 'defective') {
                    selectedCategories.push(checkbox.value);
                }
            });
            
            const hasDefective = document.querySelector('#filtersModal input[value="defective"]:checked') !== null;
            
            let message = 'Фильтры применены:\n\n';
            if (selectedCategories.length > 0) {
                message += '📂 Категории: ' + selectedCategories.join(', ') + '\n';
            }
            if (selectedPrice) {
                let priceText = '';
                if (selectedPrice.value === 'cheap') priceText = '💰 Сначала дешёвые';
                else if (selectedPrice.value === 'expensive') priceText = '💰 Сначала дорогие';
                else if (selectedPrice.value === 'discount') priceText = '🏷️ Скидки и акции';
                message += priceText + '\n';
            }
            if (selectedAvailability) {
                let availText = selectedAvailability.value === 'in_stock' ? '📦 Есть в наличии' : '📦 Нет в наличии';
                message += availText + '\n';
            }
            if (hasDefective) {
                message += '⚠️ Показывать уценённые товары\n';
            }
            if (selectedCategories.length === 0 && !selectedPrice && !selectedAvailability && !hasDefective) {
                message = 'Фильтры не выбраны';
            }
            
            alert(message);
            filtersModal.style.display = 'none';
        });
    }
</script>
</body>
        <!-- ПОДВАЛ -->
        <footer class="footer">
            <div class="container footer__container">
                <div class="footer__logo">
                    <img src="images/logo2.png" alt="Логотип">
                </div>
                <div class="footer__info">
                    2026<br>Анна Плотникова, Любовь Серикова
                </div>
            </div>
        </footer>
    </div>
</body>
</html>

<script src="cart-system.js"></script>
