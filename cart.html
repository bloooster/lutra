<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лютра — Корзина</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="3styles.css">
    <link rel="stylesheet" href="cart-styles.css">
</head>
<body>
    <div class="site-wrapper">
        <!-- ШАПКА -->
        <header class="header">
            <div class="container header__container">
                <div class="header__logo">
                    <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 38px;">
                        <img src="images/lutyra-logo.png" alt="Лютра" class="header__logo-img">
                        <span class="header__logo-text">Лютра</span>
                    </a>
                </div>
                
                <nav class="header__nav">
                    <a href="index.html" class="header__nav-link">Главная</a>
                    <a href="catalog.html" class="header__nav-link">Каталог</a>
                    <a href="#" class="header__nav-link">Доставка</a>
                    <a href="#" class="header__nav-link">Поддержка</a>
                </nav>
                
                <div class="header__actions">
                    <a href="cart.html" class="header__cart" aria-label="Корзина">
                        <img src="images/cart.png" alt="">
                    </a>
                    <button class="header__profile" aria-label="Личный кабинет">
                        <img src="images/profile.png" alt="">
                    </button>
                </div>
            </div>
        </header>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="main-content">
            <div class="container">
                <!-- ЗАГОЛОВОК СТРАНИЦЫ -->
                <div class="cart-header">
                    <a href="catalog.html" class="back-arrow" style="text-decoration: none;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"></path>
                        </svg>
                    </a>
                    <h1 class="cart-title">Ваша корзина</h1>
                </div>

                <!-- ПРОВЕРКА ПУСТОЙ КОРЗИНЫ -->
                <div id="emptyCart" class="empty-cart" style="display: none;">
                    <div class="empty-cart__content">
                        <svg class="empty-cart__icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 30 L30 60 L70 60 L80 30 M35 60 L35 80 C35 85 38 90 45 90 L55 90 C62 90 65 85 65 80 L65 60" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <h2 class="empty-cart__title">Корзина пуста</h2>
                        <p class="empty-cart__text">Пока в вашей корзине нет товаров. Выберите понравившиеся изделия в каталоге!</p>
                        <a href="catalog.html" class="empty-cart__button">Перейти в каталог</a>
                    </div>
                </div>

                <!-- СОДЕРЖИМОЕ КОРЗИНЫ -->
                <div id="cartContent" class="cart-content" style="display: none;">
                    <!-- ТОВАРЫ -->
                    <div class="cart-items">
                        <div id="cartItems" class="cart-items__list">
                            <!-- Товары будут добавлены сюда через JavaScript -->
                        </div>
                    </div>

                    <!-- ИТОГОВАЯ ИНФОРМАЦИЯ -->
                    <div class="cart-summary">
                        <div class="summary-card">
                            <h3 class="summary-title">Итого</h3>
                            
                            <div class="summary-row">
                                <span class="summary-label">Товаров:</span>
                                <span class="summary-value" id="totalItems">0</span>
                            </div>
                            
                            <div class="summary-row">
                                <span class="summary-label">Сумма:</span>
                                <span class="summary-value summary-amount" id="totalPrice">0 ₽</span>
                            </div>
                            
                            <div class="summary-divider"></div>
                            
                            <div class="summary-row summary-row--total">
                                <span class="summary-label">К оплате:</span>
                                <span class="summary-total" id="finalPrice">0 ₽</span>
                            </div>

                            <button class="summary-button" id="checkoutBtn">Оформить заказ</button>
                            <a href="catalog.html" class="summary-link">Продолжить покупки</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- ФУТЕР (копируем из index.html) -->
        <footer class="footer">
            <div class="footer__content">
                <p>&copy; 2025 Лютра. Все права защищены.</p>
            </div>
        </footer>
    </div>

    <script src="cart-system.js"></script>
    <script src="cart-page.js"></script>
</body>
</html>
